<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Dual EA Dashboard</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}
.container {
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
}
.card {
  background:#1e1e1e;
  padding:20px;
  border-radius:10px;
  width:500px;
}
canvas {
  width:100%;
  background:white;
  border-radius:10px;
}

.dd-low { color:#00ff99; }
.dd-high { color:#ff4d4d; }

@media (max-width: 768px) {
  .container {
    flex-direction: column;
    align-items: center;
  }
  .card {
    width:95%;
  }
}
</style>
</head>

<body>

<h1>Forward Test Monitor</h1>

<div class="container">

  <div class="card">
    <h2>EA1 (New Format)</h2>
    <div id="ea1_stats"></div>
    <canvas id="chart1"></canvas>
  </div>

  <div class="card">
    <h2>EA2</h2>
    <div id="ea2_stats"></div>
    <canvas id="chart2"></canvas>
  </div>

</div>

<script>

let chart1 = null;
let equityHistoryEA1 = [];

function loadEA1() {

  fetch("result_ea1.json?t=" + Date.now())
    .then(res => res.json())
    .then(data => {

      let ddClass = data.drawdown_percent > 5 ? "dd-high" : "dd-low";

      document.getElementById("ea1_stats").innerHTML =
        "Timestamp: " + data.timestamp + "<br>" +
        "Balance: " + Number(data.balance).toLocaleString() + "<br>" +
        "Equity: " + Number(data.equity).toLocaleString() + "<br>" +
        "Drawdown: <span class='" + ddClass + "'>" +
        Number(data.drawdown_percent).toFixed(2) + "%</span><br>" +
        "Open Positions: " + data.open_positions;

      // ===== 履歴 =====
      equityHistoryEA1.push(data.equity);
      if (equityHistoryEA1.length > 50) {
        equityHistoryEA1.shift();
      }

      // ===== 初回のみ生成 =====
      if (!chart1) {

        const ctx = document.getElementById("chart1").getContext("2d");

        chart1 = new Chart(ctx, {
          type: "line",
          data: {
            labels: equityHistoryEA1.map((_, i) => i + 1),
            datasets: [{
              label: "Equity",
              data: equityHistoryEA1,
              borderColor: "#00ff99",
              borderWidth: 2,
              fill: false
            }]
          },
          options: {
            responsive: true,
            animation: false,
            scales: {
              x: { ticks: { color: "white" }},
              y: { ticks: { color: "white" }}
            },
            plugins: {
              legend: { labels: { color: "white" } }
            }
          }
        });

      } else {
        chart1.data.labels = equityHistoryEA1.map((_, i) => i + 1);
        chart1.data.datasets[0].data = equityHistoryEA1;
        chart1.update();
      }

    })
    .catch(err => console.error("EA1 error:", err));
}

function updateChartEA1() {

  if (!chart1) {
    chart1 = new Chart(document.getElementById("chart1"), {
      type: "line",
      data: {
        labels: equityHistoryEA1.map((_, i) => i + 1),
        datasets: [{
          label: "Equity",
          data: equityHistoryEA1,
          borderWidth: 2,
          fill: false
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: "white" } }
        },
        scales: {
          x: { ticks: { color: "white" }},
          y: { ticks: { color: "white" }}
        }
      }
    });
  } else {
    chart1.data.labels = equityHistoryEA1.map((_, i) => i + 1);
    chart1.data.datasets[0].data = equityHistoryEA1;
    chart1.update();
  }
}


// ===== EA2（旧フォーマットのまま） =====
function loadEA2() {

  fetch("result_ea2.json?t=" + Date.now())
    .then(res => res.json())
    .then(data => {

      document.getElementById("ea2_stats").innerHTML =
        "Balance: " + Number(data.balance).toLocaleString() + "<br>" +
        "Profit: " + Number(data.profit).toLocaleString() + "<br>" +
        "WinRate: " + Number(data.winrate) + "%<br>" +
        "MaxDD: " + Number(data.max_dd).toLocaleString();

      if (Array.isArray(data.equity_curve)) {
        new Chart(document.getElementById("chart2"), {
          type: "line",
          data: {
            labels: data.equity_curve.map((_, i) => i + 1),
            datasets: [{
              label: "Equity",
              data: data.equity_curve,
              borderWidth: 2,
              fill: false
            }]
          },
          options: {
            responsive: true
          }
        });
      }

    });
}


// ===== 初回読み込み =====
loadEA1();
loadEA2();

// 30秒ごと更新（ページリロードなし）
setInterval(() => {
  loadEA1();
  loadEA2();
}, 30000);

</script>

</body>
</html>
