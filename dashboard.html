<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Dual EA Dashboard</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}
.container {
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
}
.card {
  background:#1e1e1e;
  padding:20px;
  border-radius:10px;
  width:500px;
}
canvas {
  width: 100%;
  height: 300px;   /* ← ここ重要 */
  background: white;
  border-radius: 10px;
}

@media (max-width: 768px) {

  .container {
    flex-direction: column;
    align-items: center;
  }

  .card {
    width: 95%;
  }

  canvas {
    width: 100% !important;
  }
}

</style>
</head>

<body>

<h1>Forward Test Monitor</h1>

<div class="container">

  <div class="card">
    <h2>EA1</h2>
    <div id="ea1_stats"></div>
    <canvas id="chart1"></canvas>
  </div>

  <div class="card">
    <h2>EA2</h2>
    <div id="ea2_stats"></div>
    <canvas id="chart2"></canvas>
  </div>

</div>

<script>

function loadEA(jsonFile, statsId, chartId) {

  fetch(jsonFile + "?t=" + Date.now())
    .then(res => res.json())
    .then(data => {

      // 数値表示
      document.getElementById(statsId).innerHTML =
        "Balance: " + Number(data.balance).toLocaleString() + "<br>" +
        "Profit: " + Number(data.profit).toLocaleString() + "<br>" +
        "WinRate: " + Number(data.winrate) + "%<br>" +
        "MaxDD: " + Number(data.max_dd).toLocaleString();

      // グラフ
      if (Array.isArray(data.equity_curve)) {

        new Chart(document.getElementById(chartId), {
          type: "line",
          data: {
            labels: data.equity_curve.map((_, i) => i + 1),
            datasets: [{
              label: "Equity",
              data: data.equity_curve,
              borderWidth: 2,
              fill: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: "white" }
              }
            },
            scales: {
              x: { ticks: { color: "white" }},
              y: { ticks: { color: "white" }}
            }
          }
        });

      }

    })
    .catch(err => console.error("Error:", err));
}

// 2つ読み込み
loadEA("result_ea1.json", "ea1_stats", "chart1");
loadEA("result_ea2.json", "ea2_stats", "chart2");

// 1分ごと自動更新（監視用）
setInterval(() => {
  location.reload();
}, 60000);

</script>

</body>
</html>
